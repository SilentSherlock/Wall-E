env:
  file: "robot_brain.env"
  bot_token_key: "BOT_TOKEN"
  monitored_chat_ids_key: "MONITORED_CHAT_IDS"
  whitelist_user_ids_key: "WHITELIST_USER_IDS"

moderation:
  duplicate_window_seconds: 600
  duplicate_trigger_count: 2
  mute_duration_seconds: 3600
  mute_on_violations: 2
  max_violations: 3

storage:
  sqlite_db_path: "data/walle.db"
